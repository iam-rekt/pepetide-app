<body>
<p>To generate proper PNG icons from the SVG, run:</p>
<pre>
npm install -g sharp-cli
sharp -i icon-192.svg -o icon-192.png resize 192 192
sharp -i icon-192.svg -o icon-512.png resize 512 512
</pre>
<p>Or use any online SVG to PNG converter with the icon-192.svg file</p>
</body>
